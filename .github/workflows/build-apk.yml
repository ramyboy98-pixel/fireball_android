name: Build Fireball APK

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Create clean Flutter project
        run: |
          cd ..
          flutter create -t app fireball_build --platforms=android --project-name fireball_android

      - name: Copy game files into clean project
        run: |
          cp pubspec.yaml ../fireball_build/pubspec.yaml
          rm -rf ../fireball_build/lib
          cp -r lib ../fireball_build/lib

      - name: Get packages
        run: |
          cd ../fireball_build
          flutter pub get

      - name: Build debug APK
        run: |
          cd ../fireball_build
          flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fireball-debug-apk
          path: ../fireball_build/build/app/outputs/flutter-apk/app-debug.apk
