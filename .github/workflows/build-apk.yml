name: Build Fireball APK

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Repair Flutter Android project
        run: |
          flutter create . --platforms=android --project-name fireball_android
          flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fireball-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
